name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }} — Tests & Quality
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── PHP ───────────────────────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_sqlite, sqlite3, bcmath, ctype, openssl
          coverage: none

      # ── Composer cache ────────────────────────────────────────────────────
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-php${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-php${{ matrix.php }}-

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      # ── Application bootstrap ─────────────────────────────────────────────
      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      # ── Pint (code style) ─────────────────────────────────────────────────
      - name: Check code style (Pint)
        run: vendor/bin/pint --test --parallel

      # ── PHPStan (static analysis) ─────────────────────────────────────────
      - name: Static analysis (PHPStan)
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=512M
        continue-on-error: false

      # ── PHPUnit (tests) ───────────────────────────────────────────────────
      - name: Install Node.js dependencies
        run: npm ci --omit=optional --no-audit --no-fund

      - name: Build frontend assets
        run: npm run build

      - name: Run database migrations
        run: php artisan migrate --force

      - name: Run test suite
        run: php artisan test --compact --no-coverage
